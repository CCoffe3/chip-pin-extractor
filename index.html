<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芯片引脚提取工具 - Chip Pin Extractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 16px;
            color: #86868b;
            margin-bottom: 40px;
        }
        
        .version-cards {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .version-card {
            background: #f5f5f7;
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-decoration: none;
            display: block;
        }
        
        .version-card:hover {
            background: #fff;
            border-color: #007aff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.15);
        }
        
        .version-card.recommended {
            background: linear-gradient(135deg, #007aff08 0%, #5856d608 100%);
            border-color: #007aff;
        }
        
        .version-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .version-name {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
        }
        
        .badge {
            background: #007aff;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .version-desc {
            font-size: 14px;
            color: #86868b;
            line-height: 1.5;
            text-align: left;
        }
        
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        
        .feature-tag {
            background: rgba(0, 122, 255, 0.1);
            color: #007aff;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .footer {
            font-size: 13px;
            color: #86868b;
            margin-top: 20px;
        }
        
        .auto-redirect {
            margin-top: 20px;
            padding: 16px;
            background: #f5f5f7;
            border-radius: 12px;
            font-size: 14px;
            color: #666;
        }
        
        .countdown {
            color: #007aff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📟</div>
        <h1>芯片引脚提取工具</h1>
        <p class="subtitle">智能识别芯片引脚信息，生成 Excel 表格</p>
        
        <div class="version-cards">
            <a href="ChipPinExtractor_Full.html" class="version-card recommended">
                <div class="version-header">
                    <span class="version-name">🚀 完整版</span>
                    <span class="badge">推荐</span>
                </div>
                <p class="version-desc">支持 PDF 文件解析、图片 OCR 识别、粘贴文本等多种输入方式</p>
                <div class="features">
                    <span class="feature-tag">PDF 上传</span>
                    <span class="feature-tag">图片 OCR</span>
                    <span class="feature-tag">粘贴文本</span>
                    <span class="feature-tag">自动排列</span>
                </div>
            </a>
            
            <a href="ChipPinExtractor.html" class="version-card">
                <div class="version-header">
                    <span class="version-name">⚡ 基础版</span>
                </div>
                <p class="version-desc">轻量级版本，仅支持粘贴文本，加载速度更快，适合网络受限环境</p>
                <div class="features">
                    <span class="feature-tag">粘贴文本</span>
                    <span class="feature-tag">快速加载</span>
                    <span class="feature-tag">离线可用</span>
                </div>
            </a>
        </div>
        
        <div class="auto-redirect">
            <span id="countdown" class="countdown">5</span> 秒后自动跳转到完整版...
            <br><small>或点击上方卡片手动选择</small>
        </div>
        
        <p class="footer">支持从 PDF、图片或文本中智能提取芯片引脚信息</p>
    </div>
    
    <script>
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = 'ChipPinExtractor_Full.html';
            }
        }, 1000);
    </script>
</body>
</html>
