<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pin Extractor Pro v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- 引入 html2canvas 用于截图 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { visibility: hidden; min-width: 300px; background-color: #1e293b; color: #fff; text-align: center; border-radius: 6px; padding: 12px; position: fixed; z-index: 50; left: 50%; bottom: 30px; transform: translateX(-50%); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        
        /* Chip Visualization Styles */
        .chip-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
            background: #e2e8f0;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }
        .chip-body {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            background: #1e293b;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        .chip-body::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px;
            width: 12px; height: 12px;
            background: #fbbf24;
            border-radius: 50%;
        }
        .pin-dot {
            position: absolute;
            width: 12px; height: 12px;
            background: #94a3b8;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 20;
        }
        .pin-dot:hover {
            background: #3b82f6;
            transform: translate(-50%, -50%) scale(1.5);
            z-index: 30;
        }
        .pin-dot.active { background: #10b981; }
        .pin-label {
            position: absolute;
            font-size: 10px;
            color: #475569;
            font-weight: 600;
            pointer-events: none;
            white-space: nowrap;
        }
        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
            display: none;
            z-index: 40;
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Column: Controls & Table -->
        <div class="lg:col-span-2 space-y-6">
            <!-- Header -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded">Pro v2.0</span>
                    Pin Extractor & Visualizer
                </h1>
                <p class="text-sm text-gray-500 mt-1">提取 · 可视化 · 导出 SVG/PNG/Excel</p>
            </div>

            <!-- Input Area -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-3">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">页码范围</label>
                        <input type="text" id="pageRange" value="7-9" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="flex items-end">
                        <label class="flex items-center gap-2 cursor-pointer bg-blue-50 px-4 py-2.5 rounded-lg border border-blue-100 w-full justify-center">
                            <input type="checkbox" id="forceOcr" checked class="rounded text-blue-600">
                            <span class="text-sm font-medium text-blue-800">OCR 模式</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">快速粘贴 (备用)</label>
                    <div class="flex gap-2">
                        <textarea id="pasteArea" rows="2" class="flex-1 border border-gray-300 rounded-lg p-2 text-xs font-mono focus:ring-2 focus:ring-blue-500 outline-none" placeholder="或直接粘贴表格文本..."></textarea>
                        <button onclick="processPaste()" class="bg-gray-800 hover:bg-gray-900 text-white px-4 rounded-lg text-sm font-medium transition">解析</button>
                    </div>
                </div>

                <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:bg-gray-50 hover:border-blue-400 cursor-pointer transition group">
                    <input type="file" id="fileInput" class="hidden" accept=".pdf,.jpg,.png">
                    <div class="space-y-2">
                        <svg class="mx-auto h-8 w-8 text-gray-400 group-hover:text-blue-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <p class="text-sm text-gray-600 font-medium">点击上传 PDF / 图片</p>
                    </div>
                </div>

                <button onclick="startProcess()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-md flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    开始提取并生成视图
                </button>

                <!-- Status -->
                <div id="statusArea" class="hidden bg-gray-50 rounded-lg p-4 border border-gray-200">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center text-sm font-medium text-blue-700">
                            <div id="spinner" class="loader mr-2"></div>
                            <span id="statusText">处理中...</span>
                        </div>
                        <span id="percentText" class="text-xs text-gray-500 font-mono">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-gray-700">数据列表</h3>
                    <div class="flex gap-2">
                        <input type="text" id="searchBox" placeholder="搜索引脚..." class="border border-gray-300 rounded-md px-2 py-1 text-xs focus:ring-1 focus:ring-blue-500 outline-none" onkeyup="filterTable()">
                        <select id="layoutMode" onchange="applyLayout()" class="border border-gray-300 rounded-md px-2 py-1 text-xs focus:ring-1 focus:ring-blue-500 outline-none">
                            <option value="auto">自动均分</option>
                            <option value="power_first">电源优先 (Top)</option>
                            <option value="manual">手动模式</option>
                        </select>
                    </div>
                </div>
                <div class="overflow-x-auto max-h-[400px]">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr>
                                <th class="px-4 py-2 text-left text-xs font-bold text-gray-500 uppercase w-16">Pin #</th>
                                <th class="px-4 py-2 text-left text-xs font-bold text-gray-500 uppercase">Name</th>
                                <th class="px-4 py-2 text-left text-xs font-bold text-gray-500 uppercase w-24">Type</th>
                                <th class="px-4 py-2 text-left text-xs font-bold text-gray-500 uppercase w-24">Side</th>
                                <th class="px-4 py-2 text-left text-xs font-bold text-gray-500 uppercase w-16">Action</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody" class="bg-white divide-y divide-gray-200 text-sm">
                            <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">暂无数据</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="p-3 bg-gray-50 border-t border-gray-100 text-xs text-gray-500 flex justify-between">
                    <span id="countInfo">共 0 个引脚</span>
                    <div class="flex gap-2">
                        <button onclick="exportData('excel')" class="text-green-600 hover:underline">Excel</button>
                        <button onclick="exportData('csv')" class="text-blue-600 hover:underline">CSV</button>
                        <button onclick="exportImage()" class="text-purple-600 hover:underline">导出图片 (PNG)</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Visualization -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 sticky top-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-700">芯片视图预览</h3>
                    <span class="text-xs bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full">Interactive</span>
                </div>
                
                <div id="chipCanvas" class="chip-container">
                    <div class="chip-body">
                        <span id="chipNameDisplay">CHIP</span>
                    </div>
                    <!-- Pins will be injected here -->
                    <div id="tooltip" class="tooltip"></div>
                </div>

                <div class="mt-6 space-y-3">
                    <div class="flex items-center justify-between text-xs text-gray-600">
                        <span class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-gray-400"></div> 普通信号</span>
                        <span class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-green-500"></div> 电源/地</span>
                        <span class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-blue-500"></div> 选中</span>
                    </div>
                    <div class="p-3 bg-yellow-50 rounded-lg text-xs text-yellow-800 border border-yellow-100">
                        💡 <strong>提示:</strong> 点击表格中的 "Side" 下拉框或视图中的点，可手动调整引脚位置。
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let extractedData = [];
        let worker = null;
        let tesseract = null;
        let currentFile = null;

        // --- Initialization ---
        const dropZone = document.getElementById('dropZone');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }, false));
        ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('bg-blue-50', 'border-blue-400'), false));
        ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('bg-blue-50', 'border-blue-400'), false));
        dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
        dropZone.addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(files) {
            if (files.length) {
                currentFile = files[0];
                document.getElementById('statusArea').classList.remove('hidden');
                document.getElementById('statusText').innerText = `已加载: ${currentFile.name}`;
            }
        }

        async function loadTesseract() {
            if (tesseract) return tesseract;
            try {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js';
                document.head.appendChild(script);
                await new Promise((resolve, reject) => {
                    script.onload = resolve;
                    script.onerror = () => reject(new Error("Tesseract 加载失败"));
                });
                tesseract = window.Tesseract;
                return tesseract;
            } catch (e) { throw e; }
        }

        async function startProcess() {
            const pasteText = document.getElementById('pasteArea').value.trim();
            if (pasteText) { processPaste(); return; }
            if (!currentFile) { showToast("请先选择文件或粘贴文本"); return; }
            processFile(currentFile);
        }

        async function processFile(file) {
            const statusArea = document.getElementById('statusArea');
            const statusText = document.getElementById('statusText');
            const progressBar = document.getElementById('progressBar');
            const percentText = document.getElementById('percentText');
            
            statusArea.classList.remove('hidden');
            progressBar.style.width = '0%';
            percentText.innerText = '0%';
            extractedData = [];

            const useOcr = document.getElementById('forceOcr').checked;
            const pageRangeStr = document.getElementById('pageRange').value.trim();

            try {
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'pdf') await processPdf(file, useOcr, pageRangeStr, (p, msg) => {
                    progressBar.style.width = `${p}%`;
                    percentText.innerText = `${Math.round(p)}%`;
                    statusText.innerText = msg;
                });
                else await processImage(file, (p, msg) => {
                    progressBar.style.width = `${p}%`;
                    percentText.innerText = `${Math.round(p)}%`;
                    statusText.innerText = msg;
                });

                if (extractedData.length === 0) throw new Error("未识别到数据");

                applyLayout(); // Auto layout
                renderTable();
                renderChipView();
                showToast(`成功提取 ${extractedData.length} 个引脚`);

            } catch (err) {
                console.error(err);
                statusText.innerText = "处理失败: " + err.message;
                statusText.classList.add('text-red-600');
                showToast("提取失败");
            } finally {
                if (worker) { await worker.terminate(); worker = null; }
            }
        }

        async function processPaste() {
            const text = document.getElementById('pasteArea').value;
            if (!text.trim()) return showToast("文本框为空");
            document.getElementById('statusArea').classList.remove('hidden');
            document.getElementById('statusText').innerText = "解析中...";
            document.getElementById('progressBar').style.width = '100%';
            parseLogic(text);
            if (extractedData.length === 0) return showToast("解析失败");
            applyLayout();
            renderTable();
            renderChipView();
            showToast(`解析成功：${extractedData.length} 个引脚`);
        }

        // --- Core Logic (Same as before, slightly optimized) ---
        async function processPdf(file, useOcr, rangeStr, onProgress) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            let pages = [];
            if (rangeStr) {
                const parts = rangeStr.split(',');
                parts.forEach(p => {
                    const [start, end] = p.split('-').map(Number);
                    if (end) for (let i = start; i <= end; i++) pages.push(i);
                    else pages.push(start);
                });
            } else for (let i = 1; i <= pdf.numPages; i++) pages.push(i);
            pages = pages.filter(p => p >= 1 && p <= pdf.numPages);

            let fullText = "";
            if (useOcr) {
                const Tess = await loadTesseract();
                worker = await Tess.createWorker('eng');
                for (let i = 0; i < pages.length; i++) {
                    const pageNum = pages[i];
                    onProgress(((i / pages.length) * 90), `OCR 第 ${pageNum}/${pages.length} 页...`);
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 2.5 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width; canvas.height = viewport.height;
                    await page.render({ canvasContext: ctx, viewport }).promise;
                    // Binarize
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let j = 0; j < data.length; j += 4) {
                        const avg = (data[j] + data[j + 1] + data[j + 2]) / 3;
                        data[j] = data[j+1] = data[j+2] = avg > 180 ? 255 : 0;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    const { data: { text } } = await worker.recognize(canvas);
                    fullText += text + "\n";
                }
            } else {
                onProgress(20, "原生文本提取...");
                for (const pageNum of pages) {
                    const page = await pdf.getPage(pageNum);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(' ') + "\n";
                }
            }
            onProgress(95, "解析数据...");
            parseLogic(fullText);
        }

        async function processImage(file, onProgress) {
            const Tess = await loadTesseract();
            worker = await Tess.createWorker('eng');
            onProgress(10, "识别图片...");
            const { data: { text } } = await worker.recognize(file);
            parseLogic(text);
        }

        function parseLogic(text) {
            extractedData = [];
            const lines = text.split(/\n/).map(l => l.trim()).filter(l => l.length > 2);
            const standardRegex = /^(\d+)\s+([A-Z][A-Z0-9_\/\-\.]*)/i;
            const mergedRegex = /^(\d+(?:\s*,\s*\d+)*)\s+([A-Z][A-Z0-9_\/\-\.]*)/i;
            const globalScanRegex = /\b(\d+)\s+([A-Z][A-Z0-9_\/\-\.]{2,})\b/g;
            const skipWords = ['Pin', 'Name', 'Type', 'Description', 'Table', 'Figure', 'Note', 'Rev', 'Date'];

            lines.forEach(line => {
                if (skipWords.some(w => line.toLowerCase().startsWith(w.toLowerCase()))) return;
                let match = line.match(mergedRegex);
                if (match && match[1].includes(',')) {
                    const pins = match[1].split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n > 0 && n < 300);
                    const name = match[2].replace(/[^A-Za-z0-9_]/g, '');
                    if (name.length >= 2) pins.forEach(pin => addPin(pin, name));
                    return;
                }
                match = line.match(standardRegex);
                if (match) {
                    const pin = parseInt(match[1]);
                    const name = match[2].replace(/[^A-Za-z0-9_]/g, '');
                    if (pin > 0 && pin < 300 && name.length >= 2) addPin(pin, name);
                }
            });

            if (extractedData.length === 0) {
                let match;
                while ((match = globalScanRegex.exec(text)) !== null) {
                    const pin = parseInt(match[1]);
                    const name = match[2].replace(/[^A-Za-z0-9_]/g, '');
                    if (pin > 0 && pin < 300 && name.length >= 3 && !/^(Page|Figure|Table)/i.test(name)) addPin(pin, name);
                }
            }
            extractedData.sort((a, b) => a.number - b.number);
            const seen = new Set();
            extractedData = extractedData.filter(item => {
                if (seen.has(item.number)) return false;
                seen.add(item.number);
                return true;
            });
        }

        function addPin(number, name) {
            let type = "Signal";
            if (/VCC|VDD|AVDD|DVDD|Power/i.test(name)) type = "Power";
            else if (/GND|Ground|AGND|DGND/i.test(name)) type = "Ground";
            else if (/DP|DN|P|N$/i.test(name)) type = "Diff";
            
            if (!extractedData.find(d => d.number === number)) {
                extractedData.push({ number, name, type, position: 'Top' }); // Default Top
            }
        }

        // --- Visualization & Layout Logic ---
        function applyLayout() {
            const mode = document.getElementById('layoutMode').value;
            const total = extractedData.length;
            if (total === 0) return;

            if (mode === 'auto') {
                const q = Math.ceil(total / 4);
                extractedData.forEach((d, i) => {
                    if (i < q) d.position = 'Top';
                    else if (i < 2*q) d.position = 'Right';
                    else if (i < 3*q) d.position = 'Bottom';
                    else d.position = 'Left';
                });
            } else if (mode === 'power_first') {
                // Put Power/Gnd on Top, others distributed
                const powers = extractedData.filter(d => d.type === 'Power' || d.type === 'Ground');
                const others = extractedData.filter(d => d.type !== 'Power' && d.type !== 'Ground');
                
                let idx = 0;
                powers.forEach(d => { d.position = 'Top'; idx++; });
                const remainingSides = ['Right', 'Bottom', 'Left'];
                const perSide = Math.ceil(others.length / 3);
                
                others.forEach((d, i) => {
                    if (i < perSide) d.position = 'Right';
                    else if (i < 2*perSide) d.position = 'Bottom';
                    else d.position = 'Left';
                });
            }
            // Manual mode does nothing automatically
            renderTable();
            renderChipView();
        }

        function updatePinPosition(index, newPos) {
            extractedData[index].position = newPos;
            renderChipView();
        }

        function renderTable() {
            const tbody = document.getElementById('resultBody');
            if (extractedData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-400">无数据</td></tr>';
                return;
            }
            tbody.innerHTML = extractedData.map((d, i) => `
                <tr class="hover:bg-blue-50 border-b last:border-0 group">
                    <td class="px-4 py-2 font-mono font-bold text-blue-600">${d.number}</td>
                    <td class="px-4 py-2 font-mono text-gray-800">${d.name}</td>
                    <td class="px-4 py-2">
                        <span class="px-2 py-0.5 rounded text-xs font-medium ${
                            d.type === 'Power' ? 'bg-yellow-100 text-yellow-800' : 
                            d.type === 'Ground' ? 'bg-gray-200 text-gray-800' : 
                            'bg-blue-100 text-blue-800'
                        }">${d.type}</span>
                    </td>
                    <td class="px-4 py-2">
                        <select onchange="updatePinPosition(${i}, this.value)" class="border border-gray-300 rounded text-xs px-1 py-0.5 bg-white focus:ring-1 focus:ring-blue-500 outline-none">
                            <option value="Top" ${d.position==='Top'?'selected':''}>Top</option>
                            <option value="Right" ${d.position==='Right'?'selected':''}>Right</option>
                            <option value="Bottom" ${d.position==='Bottom'?'selected':''}>Bottom</option>
                            <option value="Left" ${d.position==='Left'?'selected':''}>Left</option>
                        </select>
                    </td>
                    <td class="px-4 py-2">
                        <button onclick="deletePin(${i})" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition">✕</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('countInfo').innerText = `共 ${extractedData.length} 个引脚`;
        }

        function deletePin(index) {
            extractedData.splice(index, 1);
            applyLayout(); // Re-layout
            showToast("引脚已删除");
        }

        function filterTable() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            const rows = document.getElementById('resultBody').querySelectorAll('tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        }

        function renderChipView() {
            const container = document.getElementById('chipCanvas');
            // Clear existing pins (keep chip-body and tooltip)
            const existingPins = container.querySelectorAll('.pin-dot, .pin-label');
            existingPins.forEach(el => el.remove());

            const centerX = 200;
            const centerY = 200;
            const offset = 110; // Distance from center
            const step = 180 / (Math.max(extractedData.filter(d=>d.position==='Top').length, 1) - 1 || 1); 

            // Helper to place pins
            const placePin = (d, angle, labelOffsetX, labelOffsetY) => {
                const rad = (angle * Math.PI) / 180;
                const x = centerX + offset * Math.cos(rad);
                const y = centerY + offset * Math.sin(rad);
                
                // Dot
                const dot = document.createElement('div');
                dot.className = `pin-dot ${d.type === 'Power' || d.type === 'Ground' ? 'active' : ''}`;
                dot.style.left = `${x}px`;
                dot.style.top = `${y}px`;
                dot.onclick = () => {
                    // Cycle position on click
                    const sides = ['Top', 'Right', 'Bottom', 'Left'];
                    const next = sides[(sides.indexOf(d.position) + 1) % 4];
                    updatePinPosition(extractedData.indexOf(d), next);
                };
                
                // Tooltip events
                dot.onmouseenter = (e) => showTooltip(e, d);
                dot.onmousemove = (e) => moveTooltip(e);
                dot.onmouseleave = hideTooltip;

                // Label
                const label = document.createElement('div');
                label.className = 'pin-label';
                label.innerText = d.number;
                label.style.left = `${x + labelOffsetX}px`;
                label.style.top = `${y + labelOffsetY}px`;

                container.appendChild(dot);
                container.appendChild(label);
            };

            // Calculate counts for spacing
            const counts = { Top:0, Right:0, Bottom:0, Left:0 };
            extractedData.forEach(d => counts[d.position]++);

            let counters = { Top:0, Right:0, Bottom:0, Left:0 };

            extractedData.forEach(d => {
                const idx = counters[d.position]++;
                const total = counts[d.position];
                const span = total === 1 ? 0 : 180;
                const stepAngle = total === 1 ? 0 : span / (total - 1);
                
                let angle, lx, ly;
                if (d.position === 'Top') {
                    angle = 180 - (idx * stepAngle); // 180 to 0
                    lx = 0; ly = -20;
                } else if (d.position === 'Right') {
                    angle = 270 - (idx * stepAngle); // 270 to 90 (wait, right is 270 to 90? No. Right is -90 to 90? Standard: 0=Right, 90=Bottom, 180=Left, 270=Top. Let's stick to CSS degrees: 0=Right, 90=Down, 180=Left, 270=Up)
                    // Correction for standard unit circle in CSS (0 is 3 o'clock):
                    // Top: 270 -> 90 (via 0)? No. Top is 270. Left is 180. Bottom is 90. Right is 0/360.
                    // Let's map manually:
                    // Top: 180 to 0 (via 90? No). Top is Y- axis. Angle 270.
                    // Let's use simple coordinates instead of angles for clarity.
                }
                
                // Simplified Coordinate Logic
                let x, y, lx, ly;
                const gap = 200 / (total + 1);
                const posVal = (idx + 1) * gap;

                if (d.position === 'Top') {
                    x = posVal; y = 90; lx = 0; ly = -15;
                } else if (d.position === 'Bottom') {
                    x = posVal; y = 310; lx = 0; ly = 15;
                } else if (d.position === 'Left') {
                    x = 90; y = posVal; lx = -25; ly = -5;
                } else if (d.position === 'Right') {
                    x = 310; y = posVal; lx = 15; ly = -5;
                }

                const dot = document.createElement('div');
                dot.className = `pin-dot ${d.type === 'Power' || d.type === 'Ground' ? 'active' : ''}`;
                dot.style.left = `${x}px`;
                dot.style.top = `${y}px`;
                dot.onclick = () => {
                    const sides = ['Top', 'Right', 'Bottom', 'Left'];
                    const next = sides[(sides.indexOf(d.position) + 1) % 4];
                    updatePinPosition(extractedData.indexOf(d), next);
                };
                dot.onmouseenter = (e) => showTooltip(e, d);
                dot.onmousemove = (e) => moveTooltip(e);
                dot.onmouseleave = hideTooltip;

                const label = document.createElement('div');
                label.className = 'pin-label';
                label.innerText = d.number;
                label.style.left = `${x + lx}px`;
                label.style.top = `${y + ly}px`;

                container.appendChild(dot);
                container.appendChild(label);
            });
        }

        // Tooltip Logic
        const tooltip = document.getElementById('tooltip');
        function showTooltip(e, d) {
            tooltip.style.display = 'block';
            tooltip.innerHTML = `<strong>Pin ${d.number}</strong><br>${d.name}<br><span class="text-gray-300">${d.type}</span>`;
            moveTooltip(e);
        }
        function moveTooltip(e) {
            tooltip.style.left = (e.pageX + 10) + 'px';
            tooltip.style.top = (e.pageY + 10) + 'px';
        }
        function hideTooltip() { tooltip.style.display = 'none'; }

        // --- Export Functions ---
        function exportData(type) {
            if (!extractedData.length) return showToast("无数据");
            if (type === 'excel') {
                const ws = XLSX.utils.json_to_sheet(extractedData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Pins");
                XLSX.writeFile(wb, "PinMap_Pro.xlsx");
            } else if (type === 'csv') {
                const ws = XLSX.utils.json_to_sheet(extractedData);
                const csv = XLSX.utils.sheet_to_csv(ws);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "PinMap_Pro.csv";
                link.click();
            }
            showToast("导出成功");
        }

        function exportImage() {
            if (!extractedData.length) return showToast("无数据可导出");
            const element = document.getElementById('chipCanvas');
            // Temporarily increase size for better quality
            html2canvas(element, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Chip_Pinout.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast("图片已下载");
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = 'toast show';
            setTimeout(() => t.className = 'toast', 3000);
        }
    </script>
</body>
