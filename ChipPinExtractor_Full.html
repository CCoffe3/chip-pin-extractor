<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芯片引脚智能提取工具 Pro (PDF/图片/OCR)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <!-- Tesseract.js -->
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.01);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 表格样式优化 */
        .pin-table-container { max-height: 500px; overflow-y: auto; }
        .pin-table th { position: sticky; top: 0; background-color: #f8fafc; z-index: 10; }
        
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 12px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
        }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-white">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                芯片引脚智能提取工具 Pro
            </h1>
            <p class="mt-2 text-blue-100 text-sm">支持 PDF (文本/扫描) & 图片 OCR 识别 · 拖拽上传 · 自动解析 · Excel 导出</p>
        </div>

        <div class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Left Column: Input & Controls -->
            <div class="lg:col-span-1 space-y-6">
                
                <!-- Drop Zone -->
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <h3 class="font-semibold text-gray-700 mb-3">📁 文件输入</h3>
                    <div id="dropZone" class="drop-zone bg-white rounded-lg p-8 text-center cursor-pointer">
                        <input type="file" id="fileInput" class="hidden" accept=".pdf,.jpg,.jpeg,.png,.PNG,.JPG,.JPEG">
                        <div class="pointer-events-none">
                            <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <p class="mt-2 text-sm text-gray-600">拖拽文件到这里，或点击选择</p>
                            <p class="mt-1 text-xs text-gray-500">支持 PDF, JPG, PNG (首次加载需等待)</p>
                        </div>
                    </div>
                    
                    <!-- Status -->
                    <div id="statusArea" class="mt-4 hidden">
                        <div class="flex items-center text-sm text-blue-600 font-medium">
                            <div id="spinner" class="loader hidden"></div>
                            <span id="statusText">准备就绪</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2.5 mt-2 hidden" id="progressBarBg">
                            <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Settings -->
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <h3 class="font-semibold text-gray-700 mb-3">⚙️ 识别设置</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">识别语言</label>
                            <select id="langSelect" class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
                                <option value="chi_sim+eng">简体中文 + 英文 (推荐)</option>
                                <option value="eng">仅英文</option>
                                <option value="chi_sim">仅简体中文</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="forceOcr" class="rounded text-blue-600 focus:ring-blue-500">
                            <label for="forceOcr" class="text-sm text-gray-600">强制 OCR (用于文本 PDF 识别失败时)</label>
                        </div>
                        <div class="text-xs text-gray-500 bg-yellow-50 p-2 rounded border border-yellow-100">
                            💡 提示：如果是扫描版 PDF 或图片，请确保网络连接正常以加载 OCR 引擎。
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-2">
                    <button onclick="processFile()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition shadow-md flex justify-center items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                        开始提取
                    </button>
                    <button onclick="clearData()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg transition">
                        清空
                    </button>
                </div>
            </div>

            <!-- Right Column: Results -->
            <div class="lg:col-span-2 bg-gray-50 rounded-lg border border-gray-200 flex flex-col h-[600px]">
                <div class="p-4 border-b border-gray-200 bg-white rounded-t-lg flex justify-between items-center">
                    <h3 class="font-semibold text-gray-700">📊 提取结果预览</h3>
                    <div class="flex gap-2">
                        <button onclick="sortPins()" class="text-xs bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1.5 rounded border border-indigo-200 transition">
                            🔢 智能排序
                        </button>
                        <button onclick="exportToExcel()" class="text-xs bg-green-50 text-green-700 hover:bg-green-100 px-3 py-1.5 rounded border border-green-200 transition flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            导出 Excel
                        </button>
                    </div>
                </div>
                
                <div class="flex-1 overflow-auto pin-table-container bg-white">
                    <table class="min-w-full divide-y divide-gray-200 pin-table" id="resultTable">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-16">序号</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-24">引脚号</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">引脚名称</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-32">类型</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-20">操作</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200" id="tableBody">
                            <tr>
                                <td colspan="5" class="px-4 py-8 text-center text-gray-400 text-sm">
                                    暂无数据，请上传文件或拖拽文件到左侧区域
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="p-3 bg-gray-50 border-t border-gray-200 text-xs text-gray-500 flex justify-between">
                    <span id="rowCount">共 0 行数据</span>
                    <span>支持手动编辑单元格内容</span>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">操作成功</div>

    <script>
        // --- Global State ---
        let currentFile = null;
        let extractedData = [];
        let worker = null;

        // --- DOM Elements ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusArea = document.getElementById('statusArea');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const progressBarBg = document.getElementById('progressBarBg');
        const progressBar = document.getElementById('progressBar');
        const tableBody = document.getElementById('tableBody');
        const rowCountSpan = document.getElementById('rowCount');
        const toastEl = document.getElementById('toast');

        // --- Event Listeners for Drag & Drop ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            if (files.length > 0) {
                currentFile = files[0];
                const fileName = currentFile.name;
                const ext = fileName.split('.').pop().toLowerCase();
                
                if (!['pdf', 'jpg', 'jpeg', 'png'].includes(ext)) {
                    showToast('❌ 不支持的文件格式，请上传 PDF 或 图片 (JPG/PNG)');
                    return;
                }

                statusArea.classList.remove('hidden');
                statusText.innerText = `已选择: ${fileName} (${(currentFile.size/1024).toFixed(1)} KB)`;
                spinner.classList.add('hidden');
                progressBarBg.classList.add('hidden');
                
                // Auto trigger process after short delay for better UX
                setTimeout(() => processFile(), 500);
            }
        }

        // --- Core Processing Logic ---
        async function processFile() {
            if (!currentFile) {
                showToast('⚠️ 请先选择或拖拽文件');
                return;
            }

            resetUI();
            const forceOcr = document.getElementById('forceOcr').checked;
            const lang = document.getElementById('langSelect').value;
            const ext = currentFile.name.split('.').pop().toLowerCase();

            try {
                if (ext === 'pdf') {
                    await handlePdf(currentFile, forceOcr, lang);
                } else {
                    await handleImage(currentFile, lang);
                }
                renderTable();
                showToast('✅ 识别完成！');
            } catch (error) {
                console.error(error);
                statusText.innerText = `❌ 错误: ${error.message}`;
                showToast(`❌ 处理失败: ${error.message}`);
            } finally {
                spinner.classList.add('hidden');
                progressBarBg.classList.add('hidden');
            }
        }

        function resetUI() {
            statusArea.classList.remove('hidden');
            spinner.classList.remove('hidden');
            progressBarBg.classList.remove('hidden');
            progressBar.style.width = '0%';
            statusText.innerText = '正在初始化...';
            extractedData = [];
            tableBody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">正在处理中...</td></tr>';
        }

        function updateProgress(percent, text) {
            progressBar.style.width = `${percent}%`;
            if(text) statusText.innerText = text;
        }

        // --- PDF Handling ---
        async function handlePdf(file, forceOcr, lang) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const totalPages = pdf.numPages;
            
            updateProgress(5, `PDF 加载成功，共 ${totalPages} 页`);

            let fullText = "";
            let needsOcr = forceOcr;

            // Step 1: Try extracting native text first
            if (!forceOcr) {
                updateProgress(10, '尝试提取原生文本...');
                for (let i = 1; i <= Math.min(totalPages, 5); i++) { // Limit to first 5 pages for preview
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + "\n";
                    
                    // If we found significant text, maybe we don't need OCR? 
                    // But for chip pins, sometimes layout is complex. Let's assume if length > 50, it's good.
                    if (fullText.length > 100 && !forceOcr) {
                        // Heuristic: If we got text, we might still want to OCR if the text looks garbled or lacks numbers
                        // For now, let's trust native text unless user forces OCR.
                        needsOcr = false; 
                    }
                }
                
                if (fullText.trim().length < 20) {
                    needsOcr = true;
                    updateProgress(20, '原生文本过少，自动切换至 OCR 模式...');
                } else {
                    updateProgress(20, '原生文本提取完成，正在解析...');
                }
            } else {
                needsOcr = true;
            }

            if (needsOcr) {
                updateProgress(20, '启动 OCR 引擎 (这可能比较慢)...');
                // Initialize Tesseract
                if (!worker) {
                    worker = await Tesseract.createWorker(lang);
                } else {
                    await worker.reinitialize(lang);
                }

                // Convert PDF pages to images and OCR
                // Limit to first 3 pages to avoid browser crash on large PDFs in this demo
                const pagesToProcess = Math.min(totalPages, 3);
                
                for (let i = 1; i <= pagesToProcess; i++) {
                    updateProgress(20 + ((i-1)/pagesToProcess)*70, `正在识别第 ${i}/${pagesToProcess} 页...`);
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 }); // High scale for better OCR
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    const imgData = canvas.toDataURL('image/png');
                    const { data: { text } } = await worker.recognize(imgData);
                    fullText += text + "\n---PAGE BREAK---\n";
                }
                await worker.terminate();
                worker = null;
                updateProgress(90, 'OCR 完成，正在解析数据...');
            }

            parseTextToData(fullText);
        }

        // --- Image Handling ---
        async function handleImage(file, lang) {
            updateProgress(10, '启动 OCR 引擎...');
            
            worker = await Tesseract.createWorker(lang);
            
            updateProgress(30, '正在识别图片内容...');
            
            const { data: { text } } = await worker.recognize(file, {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        updateProgress(30 + (m.progress * 60), `识别进度: ${Math.round(m.progress * 100)}%`);
                    }
                }
            });

            await worker.terminate();
            worker = null;
            
            updateProgress(90, '识别完成，正在解析数据...');
            parseTextToData(text);
        }

        // --- Data Parsing Logic (Heuristic) ---
        function parseTextToData(text) {
            extractedData = [];
            const lines = text.split(/\n+/);
            
            // Regex patterns
            // Look for lines that look like: "1 VCC", "2 GND", "3 TX", "Pin 1: Name"
            const pinPattern = /(?:Pin\s*)?(\d{1,3})\s*[:\-\.]?\s*([A-Z0-9_\/\-]+)/i;
            // Look for lines with just number and short name at start
            const simplePattern = /^(\d{1,3})\s+([A-Z][A-Za-z0-9_]{1,10})/;

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;

                let match = line.match(pinPattern);
                if (!match) match = line.match(simplePattern);

                if (match) {
                    const pinNum = parseInt(match[1]);
                    const pinName = match[2].replace(/[^A-Za-z0-9_]/g, ''); // Clean special chars
                    
                    // Avoid duplicates
                    if (!extractedData.some(d => d.number === pinNum)) {
                        extractedData.push({
                            number: pinNum,
                            name: pinName,
                            type: 'Unknown',
                            visible: true,
                            shape: 'Round',
                            pinGroup: 'Main',
                            position: 'Auto',
                            section: 'Default'
                        });
                    }
                }
            });

            // Fallback: If regex fails completely, try to find any numbers and following words
            if (extractedData.length === 0) {
                const rawTokens = text.split(/\s+/);
                for (let i = 0; i < rawTokens.length - 1; i++) {
                    const num = parseInt(rawTokens[i]);
                    if (!isNaN(num) && num > 0 && num < 200) {
                        const nextToken = rawTokens[i+1];
                        if (nextToken && /^[A-Za-z]/.test(nextToken) && nextToken.length < 15) {
                             if (!extractedData.some(d => d.number === num)) {
                                extractedData.push({
                                    number: num,
                                    name: nextToken.replace(/[^A-Za-z0-9_]/g, ''),
                                    type: 'Unknown',
                                    visible: true,
                                    shape: 'Round',
                                    pinGroup: 'Main',
                                    position: 'Auto',
                                    section: 'Default'
                                });
                             }
                        }
                    }
                }
            }
        }

        // --- Rendering & Actions ---
        function renderTable() {
            if (extractedData.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">未识别到有效的引脚数据，请尝试更换图片或检查文件清晰度。</td></tr>';
                rowCountSpan.innerText = '共 0 行数据';
                return;
            }

            tableBody.innerHTML = '';
            extractedData.sort((a, b) => a.number - b.number);

            extractedData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">${index + 1}</td>
                    <td class="px-4 py-2 whitespace-nowrap text-sm font-medium text-gray-900">
                        <input type="number" value="${item.number}" onchange="updateData(${index}, 'number', this.value)" class="w-16 border border-gray-300 rounded px-1 py-0.5 text-xs">
                    </td>
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900">
                        <input type="text" value="${item.name}" onchange="updateData(${index}, 'name', this.value)" class="w-full border border-gray-300 rounded px-1 py-0.5 text-xs">
                    </td>
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">
                        <input type="text" value="${item.type}" onchange="updateData(${index}, 'type', this.value)" class="w-24 border border-gray-300 rounded px-1 py-0.5 text-xs">
                    </td>
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">
                        <button onclick="deleteRow(${index})" class="text-red-600 hover:text-red-900 text-xs">删除</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
            rowCountSpan.innerText = `共 ${extractedData.length} 行数据`;
        }

        window.updateData = function(index, field, value) {
            if (field === 'number') value = parseInt(value);
            extractedData[index][field] = value;
        };

        window.deleteRow = function(index) {
            extractedData.splice(index, 1);
            renderTable();
        };

        window.sortPins = function() {
            extractedData.sort((a, b) => a.number - b.number);
            renderTable();
            showToast('🔢 已按引脚号排序');
        };

        window.clearData = function() {
            currentFile = null;
            fileInput.value = '';
            extractedData = [];
            renderTable();
            statusArea.classList.add('hidden');
            showToast('🗑️ 已清空所有数据');
        };

        window.exportToExcel = function() {
            if (extractedData.length === 0) {
                showToast('⚠️ 没有数据可导出');
                return;
            }
            
            // Prepare data for Excel
            const exportData = extractedData.map(item => ({
                "Pin Number": item.number,
                "Pin Name": item.name,
                "Type": item.type,
                "Position": item.position,
                "Group": item.pinGroup
            }));

            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "PinInfo");
            
            const fileName = currentFile ? `ChipPins_${currentFile.name.split('.')[0]}.xlsx` : "ChipPins.xlsx";
            XLSX.writeFile(wb, fileName);
            showToast('📥 Excel 文件已下载');
        };

        function showToast(message) {
            toastEl.innerText = message;
            toastEl.className = "toast show";
            setTimeout(() => { toastEl.className = toastEl.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
